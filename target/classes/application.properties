spring.application.name=expencetracker
# 1. Database Connection String
# Make sure 'expense_db' matches the database you created in MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/expense_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

# 2. Your MySQL Credentials
# Change 'root' and 'your_password' to your actual MySQL username and password
spring.datasource.username=root
spring.datasource.password=Qo@76440aK

# 3. Hibernate / JPA Settings
# 'update' will create the table automatically if it doesn't exist
spring.jpa.hibernate.ddl-auto=update

# 4. Professional Debugging (Shows SQL in your IntelliJ Console)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 5. Server Port (Optional)
# Default is 8080. Change this only if 8080 is busy.
server.port=8080